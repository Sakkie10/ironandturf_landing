<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>IRON & TURF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Bebas Neue -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Bebas Neue', sans-serif;
      height: 100vh;
      overflow: hidden;
      background: #000;
      color: #fff;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    /* Left: dark gym */
    .hero-left {
      position: absolute;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1605296867304-46d5465a13f1?auto=format&fit=crop&w=2000&q=80');
      background-size: cover;
      background-position: 30% center;
      clip-path: polygon(0 0, 60% 0, 40% 100%, 0% 100%);
    }

    /* Right: simulator image with AVIF + WebP fallback */
    .hero-right {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      clip-path: polygon(60% 0, 100% 0, 100% 100%, 40% 100%);
      background-image: url('simulator.avif');
    }

    @supports not (background-image: url('simulator.avif')) {
      .hero-right {
        background-image: url('simulator.webp');
      }
    }

    /* Overlay */
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,0,0,0.15), rgba(0,0,0,0.55));
      pointer-events: none;
    }

    /* Header — soft dark bar, no border line */
    header.site-header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 18px 32px;
      background: rgba(0, 0, 0, 0.45); /* softer, no border */
      z-index
