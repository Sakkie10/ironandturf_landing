<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iron & Turf Fitness – Isle of Man</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #0d0d0d;
            color: #ffffff;
        }

        header {
            padding: 20px 40px;
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .hero {
            height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            background: linear-gradient(
                rgba(0,0,0,0.6),
                rgba(0,0,0,0.6)
            ),
            url('https://images.unsplash.com/photo-1605296867304-46d5465a13f1?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 600px;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .cta {
            padding: 14px 32px;
            background-color: #6AA84F;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
            transition: 0.2s;
        }

        .cta:hover {
            background-color: #7fc45f;
        }

        footer {
            text-align: center;
            padding: 20px;
            opacity: 0.6;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.2rem;
            }
            .hero p {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>

<header>IRON & TURF</header>

<section class="hero">
    <h1>Iron & Turf Fitness</h1>
    <p>Launching the Isle of Man’s first hybrid performance facility — a 24/7 gym combined with a state‑of‑the‑art indoor golf centre.</p>
    <a class="cta" href="mailto:rocky@ironandturf.im">Contact the Founder</a>
</section>

<footer>
    © 2026 Iron & Turf Fitness — Isle of Man
</footer>

</body>
</html>
