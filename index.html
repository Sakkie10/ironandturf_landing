<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>IRON & TURF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="site-header" id="siteHeader">
    <div class="header-inner">
      <div class="logo-wrap">
        <a href="/">
          <img src="images/ironandturf-white.png" alt="Iron & Turf Logo" class="logo-img">
        </a>
      </div>

      <nav class="header-nav">
        <a href="mailto:hello@ironandturf.im" class="header-link">Contact</a>
      </nav>
    </div>
  </header>

  <!-- HERO -->
  <main class="hero">
    <div class="hero-inner">

      <!-- VIDEO -->
      <div class="hero-bg">
        <video autoplay muted loop playsinline class="hero-video" id="heroVideo" poster="images/hero-poster.jpg">
          <source src="videos/hero.mp4" type="video/mp4">
        </video>

        <div class="hero-overlay"></div>

        <button class="video-toggle" id="videoToggle">❚❚</button>
      </div>

      <!-- TEXT IMAGES -->
      <div class="hero-text-layer">
        <div class="hero-tagline">
          <img src="images/hero-tagline.webp" alt="Train Play Perform">
        </div>

        <div class="hero-text">
          <img src="images/hero-text.webp" alt="Iron & Turf Performance Hub">
        </div>
      </div>

    </div>
  </main>

  <!-- NEXT SECTION (NEW) -->
  <section class="intro reveal">
    <div class="intro-inner">
      <h2>The Hybrid Performance Facility</h2>
      <p>
        Strength training. Turf performance. Golf simulation.
        Built for athletes, competitors, and those who train with intent.
      </p>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      © 2026 Iron & Turf Performance Hub — Isle of Man
    </div>
  </footer>

  <script src="main.js"></script>

</body>
</html>
