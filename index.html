<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>IRON & TURF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
<header class="site-header" id="siteHeader">
  <div class="header-inner">
    <div class="logo-wrap">
      <a href="/">
        <img src="images/ironandturf-white.png" alt="Iron & Turf Logo" class="logo-img">
      </a>
    </div>

    <nav class="header-nav">
      <a href="mailto:hello@ironandturf.im" class="header-link">Contact</a>
    </nav>
  </div>
</header>


  <!-- HERO -->
  <main class="hero">
    <div class="hero-inner">

      <!-- VIDEO BACKGROUND -->
      <div class="hero-bg">
        <video autoplay muted loop playsinline class="hero-video" id="heroVideo">
          <source src="videos/hero.mp4" type="video/mp4">
        </video>

        <!-- PAUSE / PLAY BUTTON -->
        <button class="video-toggle" id="videoToggle">❚❚</button>

        <!-- DARK OVERLAY -->
        <div class="hero-overlay"></div>
      </div>

      <!-- HERO CONTENT -->
      <div class="hero-content">
        <h1>Iron & Turf</h1>
        <p>Coming Soon — the Isle of Man’s first hybrid performance facility.</p>

        <a href="mailto:hello@ironandturf.im" class="cta-btn">
          Contact us for further enquiries
        </a>
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    © 2026 Iron & Turf Performance Hub — Isle of Man
  </footer>

  <!-- JavaScript -->
  <script src="main.js"></script>

</body>
</html>
