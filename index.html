<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>IRON & TURF Performance Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Bebas Neue -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Bebas Neue', sans-serif;
      background: #000;
      color: #fff;
      overflow-x: hidden; /* allow vertical scroll, block sideways scroll */
    }

    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh; /* allows scrolling */
    }

    /* Left: gym */
    .hero-left {
      position: absolute;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1605296867304-46d5465a13f1?auto=format&fit=crop&w=2000&q=80');
      background-size: cover;
      background-position: 30% center;
      clip-path: polygon(0 0, 60% 0, 40% 100%, 0% 100%);
    }

    /* Right: simulator */
    .hero-right {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      clip-path: polygon(60% 0, 100% 0, 100% 100%, 40% 100%);
      background-image: url('simulator.avif');
    }

    @supports not (background-image: url('simulator.avif')) {
      .hero-right {
        background-image: url('simulator.webp');
      }
    }

    /* Overlay */
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,0,0,0.15), rgba(0,0,0,0.55));
      pointer-events: none;
    }

    /* Header */
    header.site-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 18px 32px;
      background: rgba(0, 0, 0, 0.45);
      z-index: 20;
      display: flex;
      align-items: center;
      backdrop-filter: blur(4px);
    }

    .brand-line {
      display: flex;
      align-items: baseline;
      gap: 6px;
      line-height: 1;
    }

    .brand-iron-and {
      font-size: clamp(24px, 4vw, 32px);
      color: #ffffff;
    }

    .brand-turf {
      font-size: clamp(24px, 4vw, 32px);
      color: #6AA84F;
    }

    /* Center text */
    .center-text {
      position: relative;
      margin-top: 30vh;
      text-align: center;
      max-width: 650px;
      padding: 0 20px;
      margin-left: auto;
      margin-right: auto;
      z-index: 10;
    }

    .center-text h1 {
      font-size: clamp(36px, 6vw, 64px);
      margin-bottom: 12px;
    }

    .center-text p {
      font-size: clamp(14px, 2.5vw, 20px);
      line-height: 1.3;
      font-family: Arial, sans-serif;
      font-weight: 300;
      margin-bottom: 28px;
    }

    /* Button */
    .cta-btn {
      display: inline-block;
      padding: 14px 28px;
      background: #6AA84F;
      color: #000;
      font-family: Arial, sans-serif;
      font-size: clamp(14px, 2vw, 18px);
      font-weight: bold;
      border-radius: 6px;
      text-decoration: none;
      transition: 0.2s ease;
    }

    .cta-btn:hover {
      background: #7ec95a;
    }

    /* Footer */
    footer {
      width: 100%;
      padding: 20px 0;
      text-align: center;
      font-size: clamp(12px, 2vw, 14px);
      font-family: Arial, sans-serif;
      background: rgba(0, 0, 0, 0.45);
      margin-top: 40vh;
      backdrop-filter: blur(4px);
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      .hero-left {
        clip-path: polygon(0 0, 100% 0, 60% 100%, 0% 100%);
      }

      .hero-right {
        clip-path: polygon(40% 0, 100% 0, 100% 100%, 0 100%);
      }

      header.site-header {
        padding: 14px 20px;
      }
    }

    /* Very small phones */
    @media (max-width: 420px) {
      .center-text {
        padding: 0 10px;
      }

      .cta-btn {
        padding: 12px 20px;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="brand-line">
      <span class="brand-iron-and">IRON &</span>
      <span class="brand-turf">TURF</span>
    </div>
  </header>

  <div class="hero">
    <div class="hero-left"></div>
    <div class="hero-right"></div>
    <div class="hero-overlay"></div>

    <!-- Center text -->
    <div class="center-text">
      <h1>Iron & Turf Performance Hub</h1>
      <p>Coming Soon — the Isle of Man’s first hybrid performance facility.</p>
      <a href="#" class="cta-btn">Contact us for further enquiries</a>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    © 2026 Iron & Turf Performance Hub — Isle of Man
  </footer>

</body>
</html>
