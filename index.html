<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>IRON & TURF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Handelson+Six&display=swap" rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="site-header" id="siteHeader">
    <div class="header-inner">
      <div class="logo-wrap">
        <a href="/">
          <img src="images/ironandturf-white.png" alt="Iron & Turf Logo" class="logo-img">
        </a>
      </div>

      <nav class="header-nav">
        <a href="mailto:hello@ironandturf.im" class="header-link">Contact</a>
      </nav>
    </div>
  </header>

  <!-- HERO -->
  <main class="hero">
    <div class="hero-inner">

      <!-- VIDEO BACKGROUND -->
      <div class="hero-bg">
        <video autoplay muted loop playsinline class="hero-video" id="heroVideo">
          <source src="videos/hero.mp4" type="video/mp4">
        </video>

        <div class="hero-overlay"></div>

        <button class="video-toggle" id="videoToggle">❚❚</button>
      </div>

      <!-- HERO BLOCK -->
      <div class="hero-block">

        <h1 class="hero-headline">
          <span class="tp">TRAIN. PLAY.</span><br>
          <span class="perform">PERFORM.</span>
        </h1>

        <div class="hero-paragraph">
          <p>Discover the Isle of Man’s first ever hybrid performance hub</p>
          <p><strong>Where Strength Meets Precision.</strong></p>
          <p>A performance‑driven space for strength, golf, and real‑world conditioning.</p>
        </div>

      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      © 2026 Iron & Turf Performance Hub — Isle of Man
    </div>
  </footer>

  <!-- JavaScript -->
  <script src="main.js"></script>

</body>
</html>
