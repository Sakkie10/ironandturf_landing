<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>IRON & TURF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Bebas Neue -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Bebas Neue', sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header.site-header {
      width: 100%;
      padding: 18px 32px;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(4px);
    }

    .brand-line {
      display: flex;
      align-items: baseline;
      gap: 6px;
      line-height: 1;
    }

    .brand-iron-and {
      font-size: clamp(24px, 4vw, 32px);
      color: #ffffff;
    }

    .brand-turf {
      font-size: clamp(24px, 4vw, 32px);
      color: #6AA84F;
    }

    /* Main hero section */
    main.hero {
      position: relative;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 64px 20px 64px;
      overflow: hidden;
    }

    .hero-inner {
      position: relative;
      width: 100%;
      max-width: 1200px;
      min-height: 60vh;
    }

    /* Background halves for desktop */
    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .hero-left,
    .hero-right {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
    }

    .hero-left {
      background-image: url('https://images.unsplash.com/photo-1605296867304-46d5465a13f1?auto=format&fit=crop&w=2000&q=80');
      background-position: 30% center;
      clip-path: polygon(0 0, 60% 0, 40% 100%, 0% 100%);
    }

    .hero-right {
      background-image: url('simulator.webp');
      clip-path: polygon(60% 0, 100% 0, 100% 100%, 40% 100%);
    }

    @supports not (background-image: url('simulator.webp')) {
      .hero-right {
        background-image: url('simulator.webp');
      }
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,0,0,0.15), rgba(0,0,0,0.7));
    }

    /* Content */
    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 650px;
      margin: 0 auto;
    }

    .hero-content h1 {
      font-size: clamp(36px, 6vw, 64px);
      margin-bottom: 12px;
    }

    .hero-content p {
      font-size: clamp(14px, 2.5vw, 20px);
      line-height: 1.3;
      font-family: Arial, sans-serif;
      font-weight: 300;
      margin-bottom: 28px;
    }

    .cta-btn {
      display: inline-block;
      padding: 14px 28px;
      background: #6AA84F;
      color: #000;
      font-family: Arial, sans-serif;
      font-size: clamp(14px, 2vw, 18px);
      font-weight: bold;
      border-radius: 6px;
      text-decoration: none;
      transition: 0.2s ease;
    }

    .cta-btn:hover {
      background: #7ec95a;
    }

    /* Footer */
    footer {
      width: 100%;
      padding: 16px 10px;
      text-align: center;
      font-size: clamp(12px, 2vw, 14px);
      font-family: Arial, sans-serif;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
    }

    /* Tablet & down */
    @media (max-width: 900px) {
      main.hero {
        padding: 48px 16px 48px;
      }

      .hero-inner {
        min-height: 70vh;
      }
    }

    /* Mobile: stack images instead of diagonal split */
    @media (max-width: 768px) {
      .hero-bg {
        position: static;
        display: flex;
        flex-direction: column;
        height: auto;
      }

      .hero-left,
      .hero-right {
        position: relative;
        clip-path: none;
        height: 200px;
      }

      .hero-left {
        background-position: center;
      }

      .hero-right {
        background-position: center;
      }

      .hero-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.9));
      }

      .hero-inner {
        padding-top: 16px;
      }

      .hero-content {
        margin-top: 16px;
      }

      header.site-header {
        padding: 14px 16px;
      }
    }

    /* Very small phones */
    @media (max-width: 420px) {
      .cta-btn {
        padding: 12px 20px;
      }

      .hero-content {
        padding: 0 4px;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="brand-line">
      <span class="brand-iron-and">IRON &</span>
      <span class="brand-turf">TURF</span>
    </div>
  </header>

  <!-- Hero -->
  <main class="hero">
    <div class="hero-inner">
      <div class="hero-bg">
        <div class="hero-left"></div>
        <div class="hero-right"></div>
        <div class="hero-overlay"></div>
      </div>

      <div class="hero-content">
        <h1>Iron & Turf</h1>
        <p>Coming Soon — the Isle of Man’s first hybrid performance facility.</p>
        <a href="#" class="cta-btn">Contact us for further enquiries</a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    © 2026 Iron & Turf Performance Hub — Isle of Man
  </footer>

</body>
</html>
